<!--
  HEADER + SIGN OUT SNIPPET
  --------------------------
  Copy this block into every app page (not auth pages).
  Sign Out is always top-right of the header.

  - On the dashboard: remove the "← Back" link.
  - On all other pages: keep it and update href and the label.
  - Update [Page Name] for each page.

  Requires: Supabase initialised inline on the same page (see supabase-init.html).
  Requires: css/style.css linked in <head>.
-->

<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html" class="header-back">← Back</a>  <!-- remove on dashboard -->
      <span class="header-title">[Page Name]</span>
    </div>
    <button class="sign-out-btn" id="signOutBtn">Sign Out</button>
  </div>
</header>

<!--
  Add this inside your existing <script type="module"> block
  (do not create a second module script — add it to the one with supabase init):

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.href = 'login.html';
  });
-->
