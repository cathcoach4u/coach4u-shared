<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[App Name] — Sign In</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003366">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo"><h1>[App Name]</h1></div>
    <p class="login-subtitle">Sign in to access your coaching resources.</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" required autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePassword()">Show</button>
        </div>
      </div>
      <div id="message" class="login-message"></div>
      <button type="submit" class="login-btn" id="submitBtn">Sign In</button>
    </form>

    <a href="forgot-password.html" class="login-forgot">Forgot password?</a>
  </div>

  <footer style="position:fixed; bottom:0; width:100%; text-align:center; font-size:14px; color:rgba(255,255,255,0.6); padding:12px 0;">
    Strengths-Based Coaching and Counselling | <a href="https://coach4u.com.au" style="color:rgba(255,255,255,0.6);">coach4u.com.au</a>
  </footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const SUPABASE_URL = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.togglePassword = function() {
      const pw = document.getElementById('password');
      const btn = document.querySelector('.toggle-password');
      if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
      else { pw.type = 'password'; btn.textContent = 'Show'; }
    };

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msgEl = document.getElementById('message');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      msgEl.style.display = 'none';
      msgEl.className = 'login-message';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        msgEl.textContent = 'Incorrect email or password.';
        msgEl.classList.add('error');
        msgEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      } else {
        const { data: { user } } = await sb.auth.getUser();
        const { data: userData } = await sb.from('users').select('membership_status').eq('id', user.id).single();
        window.location.href = userData?.membership_status === 'active' ? 'dashboard.html' : 'inactive.html';
      }
    });
  </script>
</body>
</html>
