<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[App Name] — Set New Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">

  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:20px;">

    <div class="login-card">
      <div class="login-logo">
        <h1>[App Name]</h1>
      </div>
      <p class="login-title">Set a new password</p>
      <p class="login-subtitle">Choose a password that's at least 8 characters.</p>

      <form id="resetForm">
        <div class="form-group">
          <label for="password">New password</label>
          <div class="password-wrapper">
            <input type="password" id="password" required minlength="8" autocomplete="new-password">
            <button type="button" class="toggle-password" id="toggleBtn">Show</button>
          </div>
        </div>

        <div id="message" class="login-message"></div>

        <button type="submit" class="login-btn" id="submitBtn">Update Password</button>
      </form>
    </div>

    <p style="margin-top:20px;font-family:'Montserrat',sans-serif;font-size:9pt;color:rgba(255,255,255,0.75);text-align:center;line-height:1.6;">
      Strengths-Based Coaching and Counselling<br>
      <a href="http://www.coach4u.com.au" style="color:rgba(255,255,255,0.75);">www.coach4u.com.au</a> |
      <a href="mailto:cath@coach4u.com.au" style="color:rgba(255,255,255,0.75);">cath@coach4u.com.au</a> |
      0402 313 337
    </p>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form    = document.getElementById('resetForm');
    const msgEl   = document.getElementById('message');
    const btn     = document.getElementById('submitBtn');
    const toggle  = document.getElementById('toggleBtn');
    const pwInput = document.getElementById('password');

    // Supabase appends the recovery token as a URL hash fragment.
    // The client SDK picks it up automatically on page load — no manual
    // token handling needed.

    toggle.addEventListener('click', () => {
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        toggle.textContent = 'Hide';
      } else {
        pwInput.type = 'password';
        toggle.textContent = 'Show';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Updating…';
      msgEl.style.display = 'none';
      msgEl.className = 'login-message';

      const { error } = await supabase.auth.updateUser({ password: pwInput.value });

      msgEl.style.display = 'block';
      if (error) {
        msgEl.classList.add('error');
        msgEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Update Password';
      } else {
        msgEl.classList.add('success');
        msgEl.textContent = 'Password updated. Taking you to sign in…';
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>

</body>
</html>
